spring:
  application:
    name: catalog
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    contexts: dev
  datasource:
    url: jdbc:postgresql://localhost:5433/catalog_service_db
    username: Artem
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: catalog-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: "com.kazakov.catalog.kafka.consumer.KafkaOrderEvent"
        spring.json.trusted.packages: "*"

debug: true

server:
  port: 8081

kafka:
  topics:
    product: product-events
    order-commands: order-commands
    catalog-replies: catalog-replies
