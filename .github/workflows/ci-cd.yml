name: Java CI/CD with Gradle and Docker

on:
  push:
    branches: [ "main" ]

# Даем пайплайну права на запись Docker-образов в пакеты GitHub
permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем код
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Права на Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Сборка проекта (без тестов, так как базы данных на сервере GitHub нет)
      - name: Build with Gradle
        run: ./gradlew build -x test

      # 5. Инициализация Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. АВТОРИЗАЦИЯ В GITHUB REGISTRY (Начало CD-этапа)
      # Используем встроенный секретный токен, который GitHub создает сам для каждой джобы
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7. СБОРКА И ПУШ ОБРАЗА В ОБЛАКО
      # Теперь мы добавляем параметр 'push: true' и указываем два тега:
      # 'latest' (для самой свежей версии) и хэш коммита (для истории)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}